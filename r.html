<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#141619" />
<title>BEAR Park</title>
<meta name="robots" content="noindex" />
<meta property="og:title" content="BEAR Park Raid" />
<meta property="og:description" content="Joining the raid." />
<meta property="og:type" content="website" />
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #141619; color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    display: grid; place-items: center; overflow: hidden;
  }
  .wrap { text-align: center; opacity: 0.7; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255, 174, 0, 0.18);
    border-top-color: #ffae00;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  .msg { font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.5); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="msg">joining raid…</div>
</div>
<script>
(function() {
  // Read raid id from ?id=N or /r/<id>
  const params = new URLSearchParams(window.location.search);
  let raidId = params.get('id');
  if (!raidId) {
    const m = window.location.pathname.match(/\/r\/(\d+)/);
    if (m) raidId = m[1];
  }
  raidId = raidId ? parseInt(raidId, 10) : null;

  function bail() { window.location.replace('/'); }
  if (!raidId) { bail(); return; }

  (async function run() {
    // Get the tweet URL so we can redirect there after the invisible claim
    let tweetUrl = '';
    try {
      const list = await fetch('/api/raids/current', { cache: 'no-store' }).then((r) => r.json());
      const raid = ((list && list.raids) || []).find((r) => Number(r.id) === raidId);
      tweetUrl = (raid && raid.twitter_url) || '';
    } catch {}
    if (!tweetUrl) { bail(); return; }

    const wallet = localStorage.getItem('bearpark_wallet');

    // If signed in on this device, fire the TG claim. This credits honey
    // immediately (no 120s timer, no visible UI) and also logs the raid
    // to honey_points_activity for BEARdrops 24h. Fire-and-wait briefly so
    // the credit lands even if the browser kills the request on nav.
    if (wallet) {
      try {
        await fetch('/api/raids/tg-claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet_address: wallet, raid_id: raidId }),
          cache: 'no-store',
          keepalive: true
        });
      } catch {}
    }

    // One-way trip to the tweet — no BEAR Park page in the user's face.
    window.location.replace(tweetUrl);
  })();
})();
</script>
</body>
</html>
