<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#141619" />
<title>BEAR Park — Raid</title>
<meta name="robots" content="noindex" />

<!-- Social preview for when the TG link is shared elsewhere -->
<meta property="og:title" content="BEAR Park — Raid" />
<meta property="og:description" content="Joining the raid." />
<meta property="og:type" content="website" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #141619;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .wrap { text-align: center; opacity: 0.8; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255, 174, 0, 0.18);
    border-top-color: #ffae00;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  .msg { font-size: 14px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
  <div class="spinner"></div>
  <div class="msg">joining the raid…</div>
</div>

<script>
  (function() {
    // ---- Read raid id from ?id= or /r/<id> ----
    const params = new URLSearchParams(window.location.search);
    let raidId = params.get('id');
    if (!raidId) {
      const m = window.location.pathname.match(/\/r\/(\d+)/);
      if (m) raidId = m[1];
    }
    raidId = raidId ? parseInt(raidId, 10) : null;

    function bailToHome(delayMs) {
      setTimeout(() => { window.location.replace('/'); }, delayMs || 1200);
    }

    if (!raidId) { bailToHome(0); return; }

    // ---- Fetch raid to get the real twitter_url + verify it exists ----
    fetch('/api/raids/current', { cache: 'no-store' })
      .then((r) => r.json())
      .then((data) => {
        const raids = (data && data.raids) || [];
        const raid = raids.find((r) => Number(r.id) === raidId);
        if (!raid || !raid.twitter_url) {
          bailToHome(0);
          return;
        }

        // ---- Fire-and-forget: claim honey for this wallet if signed in ----
        const wallet = localStorage.getItem('bearpark_wallet');
        if (wallet) {
          try {
            fetch('/api/raids/tg-claim', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ wallet_address: wallet, raid_id: raidId }),
              keepalive: true, // survives the navigation below
              cache: 'no-store'
            }).catch(() => {});
          } catch {}
        }

        // ---- Off to X. One-way trip. ----
        window.location.replace(raid.twitter_url);
      })
      .catch(() => bailToHome(0));
  })();
</script>

</body>
</html>
