<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#141619" />
<title>BEAR Park</title>
<meta name="robots" content="noindex" />
<meta property="og:title" content="BEAR Park Raid" />
<meta property="og:description" content="Joining the raid." />
<meta property="og:type" content="website" />
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #141619; color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    display: grid; place-items: center; overflow: hidden;
  }
  .wrap { text-align: center; opacity: 0.7; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255, 174, 0, 0.18);
    border-top-color: #ffae00;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  .msg { font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.5); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="msg">joining raid…</div>
</div>
<script>
(function() {
  // ---- 1. Parse raid id from ?id=N or /r/<id> -----------------------------
  const params = new URLSearchParams(window.location.search);
  let raidId = params.get('id');
  if (!raidId) {
    const m = window.location.pathname.match(/\/r\/(\d+)/);
    if (m) raidId = m[1];
  }
  raidId = raidId ? parseInt(raidId, 10) : null;

  function bail() { window.location.replace('/'); }
  if (!raidId) { bail(); return; }

  // ---- 2. FIRE-AND-FORGET the tg-claim immediately ------------------------
  // Do this synchronously on script start so the request is queued BEFORE
  // we kick off the redirect. sendBeacon is built for this exact situation:
  // guaranteed delivery across page unload/navigation (unlike fetch+keepalive
  // which is flaky on mobile WebViews, especially Telegram's in-app browser).
  //
  // Why this matters: on mobile TG the user taps a raid link → opens TG's
  // in-app WebView → loads this page → we immediately redirect to x.com.
  // With `await fetch(...)` the browser often cancels the in-flight claim
  // the instant we navigate. sendBeacon is queued at the OS level and
  // delivered even if the tab is destroyed 1ms later.
  (function fireClaim() {
    const wallet = localStorage.getItem('bearpark_wallet');
    if (!wallet) return; // not signed in on THIS browser/WebView — no credit

    const payload = JSON.stringify({ wallet_address: wallet, raid_id: raidId });
    let queued = false;

    try {
      if (navigator.sendBeacon) {
        const blob = new Blob([payload], { type: 'application/json' });
        queued = navigator.sendBeacon('/api/raids/tg-claim', blob);
      }
    } catch (_) {}

    if (!queued) {
      // Fallback for ancient WebViews that don't support sendBeacon.
      // keepalive:true tells the browser to not cancel on unload.
      try {
        fetch('/api/raids/tg-claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload,
          cache: 'no-store',
          keepalive: true,
          mode: 'same-origin'
        }).catch(() => {});
      } catch (_) {}
    }
  })();

  // ---- 3. Look up tweet URL (with timeout) then redirect ------------------
  (async function redirect() {
    let tweetUrl = '';
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 4000);
      const res = await fetch('/api/raids/current', {
        cache: 'no-store',
        signal: ctrl.signal
      });
      clearTimeout(timer);
      const list = await res.json();
      const raid = ((list && list.raids) || []).find((r) => Number(r.id) === raidId);
      tweetUrl = (raid && raid.twitter_url) || '';
    } catch (_) {
      // network flake or slow API — fall through to bail
    }

    if (!tweetUrl) { bail(); return; }
    window.location.replace(tweetUrl);
  })();
})();
</script>
</body>
</html>
