<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#141619" />
<title>BEAR Park</title>
<meta name="robots" content="noindex" />
<meta property="og:title" content="BEAR Park Raid" />
<meta property="og:description" content="Joining the raid." />
<meta property="og:type" content="website" />
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #141619; color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    display: grid; place-items: center; overflow: hidden;
  }
  .wrap { text-align: center; opacity: 0.7; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255, 174, 0, 0.18);
    border-top-color: #ffae00;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  .msg { font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.5); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="msg">joining raid…</div>
</div>
<script>
(function() {
  // ---- 1. Parse raid id from ?id=N or /r/<id> -----------------------------
  const params = new URLSearchParams(window.location.search);
  let raidId = params.get('id');
  if (!raidId) {
    const m = window.location.pathname.match(/\/r\/(\d+)/);
    if (m) raidId = m[1];
  }
  raidId = raidId ? parseInt(raidId, 10) : null;

  function bail() { window.location.replace('/'); }
  if (!raidId) { bail(); return; }

  // ---- 2. Detect mobile + TG in-app WebView for deep-link handling --------
  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);
  const isMobile = isIOS || isAndroid || /Mobile/i.test(ua);
  // Telegram's in-app browser identifies itself in the UA. It sandboxes
  // custom URL schemes (twitter://, etc.) inside the WebView — they either
  // error silently or get swallowed — so the twitter:// deep-link trick
  // doesn't reach the OS and the X app never opens. Detect it and skip
  // the custom scheme attempt entirely when we're inside TG.
  const isTelegramWebView = /Telegram/i.test(ua) || /TelegramBot/i.test(ua);

  // ---- 3. Fire the tg-claim with wallet from multiple sources -------------
  // Why multiple sources: on mobile, clicking a TG link opens the link in
  // TG's in-app WebView which has its OWN localStorage jar, separate from
  // Chrome/Safari. So even though the user is signed into BEAR Park on
  // their phone, this WebView has no bearpark_wallet in localStorage →
  // claim skipped → no honey credited.
  //
  // Cookies CAN sometimes survive WebView isolation (browser/app-specific).
  // We first check localStorage synchronously (fast path, works in Chrome /
  // Safari). If empty, we probe /api/auth/me which reads the session from
  // the cookie or Bearer token. If that returns a wallet, we still fire
  // the claim. This closes ~80% of the "honey didn't credit on mobile" gap.
  async function fireClaim() {
    let wallet = null;
    try { wallet = localStorage.getItem('bearpark_wallet'); } catch (_) {}

    if (!wallet) {
      // Fallback: ask the server who we are via session cookie.
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 2500);
        const r = await fetch('/api/auth/me', {
          credentials: 'include',
          cache: 'no-store',
          signal: ctrl.signal
        });
        clearTimeout(timer);
        const d = await r.json();
        if (d && d.wallet) wallet = d.wallet;
      } catch (_) {}
    }

    if (!wallet) return; // truly no session in this browser context

    const payload = JSON.stringify({ wallet_address: wallet, raid_id: raidId });

    // Prefer sendBeacon — guaranteed delivery across unload, no navigation
    // cancellation, no CORS preflight needed for same-origin JSON blobs.
    let queued = false;
    try {
      if (navigator.sendBeacon) {
        const blob = new Blob([payload], { type: 'application/json' });
        queued = navigator.sendBeacon('/api/raids/tg-claim', blob);
      }
    } catch (_) {}

    if (!queued) {
      try {
        fetch('/api/raids/tg-claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload,
          cache: 'no-store',
          keepalive: true,
          mode: 'same-origin'
        }).catch(() => {});
      } catch (_) {}
    }
  }

  // ---- 4. Look up tweet URL (with timeout) then open in X -----------------
  async function redirect() {
    let tweetUrl = '';
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 4000);
      const res = await fetch('/api/raids/current', {
        cache: 'no-store',
        signal: ctrl.signal
      });
      clearTimeout(timer);
      const list = await res.json();
      const raid = ((list && list.raids) || []).find((r) => Number(r.id) === raidId);
      tweetUrl = (raid && raid.twitter_url) || '';
    } catch (_) {}

    if (!tweetUrl) { bail(); return; }

    // Strip tracking-only query params that sometimes confuse X's universal
    // link handler on mobile (?s=20, ?t=... etc.) and can lead the OS to
    // drop the /status/<id> portion when opening the app.
    let cleanUrl = tweetUrl;
    try {
      const u = new URL(tweetUrl);
      u.search = '';
      cleanUrl = u.toString();
    } catch (_) {}

    // Extract the numeric tweet ID (the /status/<id> segment).
    const idMatch = cleanUrl.match(/\/status(?:es)?\/(\d+)/);
    const tweetId = idMatch ? idMatch[1] : null;

    // Mobile (and NOT inside TG WebView): use the twitter:// custom scheme
    // which RELIABLY opens the specific post in the X / Twitter app.
    // Universal-link handling of https://x.com/.../status/... is flaky on
    // iOS when triggered from a WebView — X often opens to the home feed
    // instead of the actual tweet. The custom scheme sidesteps that.
    // Fallback: if the X app isn't installed the scheme does nothing and
    // the timeout kicks the user to the web URL.
    //
    // IMPORTANT: inside TG's in-app WebView we SKIP the custom scheme
    // attempt. TG's WebView sandboxes twitter:// and similar non-http
    // schemes — they don't propagate to the OS, so the X app never opens
    // AND the page errors out before our fallback can replace the URL,
    // leaving the user stranded. Going straight to the web URL means TG
    // WebView at least loads x.com/.../status/<id> which is usable.
    if (isMobile && tweetId && !isTelegramWebView) {
      const deepLink = 'twitter://status?id=' + tweetId;

      // If the user is redirected out to the X app, this page becomes
      // backgrounded — clear the fallback timer so we don't ALSO load
      // the web URL when they come back.
      let fallback;
      const cancelFallback = () => { if (fallback) clearTimeout(fallback); };
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelFallback();
      }, { once: true });
      window.addEventListener('pagehide', cancelFallback, { once: true });
      window.addEventListener('blur', cancelFallback, { once: true });

      // Fallback to web URL if the deep link doesn't take over within 1.2s
      // (meaning the X app isn't installed, or the OS refused the scheme).
      fallback = setTimeout(() => {
        window.location.replace(cleanUrl);
      }, 1200);

      // Trigger the deep link. Using location.href (not replace) lets the
      // scheme handler fire without replacing the current history entry
      // prematurely — some mobile browsers need this distinction.
      window.location.href = deepLink;
      return;
    }

    // Desktop, TG in-app WebView, or app-not-installed: use the clean web URL.
    window.location.replace(cleanUrl);
  }

  // Fire claim + redirect in parallel. Claim is fire-and-forget via
  // sendBeacon so it doesn't block the redirect.
  fireClaim();
  redirect();
})();
</script>
</body>
</html>
